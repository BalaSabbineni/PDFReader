spring:
  application:
    name: pdf-reader

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB

server:
  port: 50000

aws:
  region: ${AWS_REGION:us-east-1}
  credentials:
    # Leave blank to use DefaultCredentialsProvider (env vars / IAM role) for real AWS
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
  s3:
    bucket-name: ${AWS_S3_BUCKET:pdf-podcast-bucket}
    # Set this for LocalStack. Leave blank for real AWS.
    endpoint: ${LOCALSTACK_ENDPOINT:http://localhost:4566}

jwt:
  secret: ${JWT_SECRET}

cors:
  allowed-origins: ${MY_CORS_ORIGINS:http://localhost:3000,http://localhost:5500}
