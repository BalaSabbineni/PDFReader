<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Podcast — Listen to Your Books</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ─── Login / Register Overlay ─────────────────────────────────────────── -->
  <div id="auth-overlay" class="visible">
    <div class="auth-box">
      <div class="logo" style="justify-content:center;margin-bottom:24px;">
        <span class="logo-icon">🎙</span>
        <span>PDF Podcast</span>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Sign In</button>
        <button class="auth-tab" id="tab-register">Register</button>
      </div>
      <form id="auth-form">
        <div class="form-group">
          <label for="auth-username">Username</label>
          <input class="form-input" type="text" id="auth-username" placeholder="Enter username" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="auth-password">Password</label>
          <input class="form-input" type="password" id="auth-password" placeholder="Enter password" required autocomplete="current-password" />
        </div>
        <button class="btn-primary" type="submit" id="auth-submit" style="width:100%">Sign In</button>
        <div id="auth-status" class="upload-status"></div>
      </form>
    </div>
  </div>

  <!-- ─── Header ──────────────────────────────────────────────────────────── -->
  <header>
    <div class="logo">
      <span class="logo-icon">🎙</span>
      <span>PDF Podcast</span>
    </div>
    <div class="header-right">
      <select id="lang-select" class="speed-select" title="Language">
        <option value="en">English</option>
        <option value="te">తెలుగు</option>
      </select>
      <button class="btn-primary" id="btn-upload-open">+ Upload PDF</button>
      <span id="user-badge" class="user-badge"></span>
      <button class="btn-logout" id="btn-logout" title="Logout">⏏ Logout</button>
    </div>
  </header>

  <!-- ─── Main Content ─────────────────────────────────────────────────────── -->
  <main>
    <!-- Bookshelf -->
    <section>
      <p class="section-title">Your Library</p>
      <div id="bookshelf"></div>
    </section>

    <!-- Current page text panel -->
    <aside id="text-panel">
      <h2>Current Page Text</h2>
      <p id="page-text">Select a book to start listening.</p>
    </aside>
  </main>

  <!-- ─── Audio Player Bar ─────────────────────────────────────────────────── -->
  <div id="player-bar">
    <!-- Progress bar at top -->
    <div class="progress-bar">
      <div id="progress-fill"></div>
    </div>

    <!-- Book info -->
    <div class="player-info">
      <div id="player-title">No book selected</div>
      <div id="player-page">—</div>
    </div>

    <!-- Controls -->
    <div class="player-controls">
      <button class="ctrl-btn" id="btn-prev" title="Previous page">⏮</button>
      <button class="ctrl-btn play-btn" id="btn-play-pause" title="Play / Pause" disabled>▶</button>
      <button class="ctrl-btn" id="btn-stop" title="Stop">⏹</button>
      <button class="ctrl-btn" id="btn-next" title="Next page">⏭</button>
    </div>

    <!-- Speed -->
    <select class="speed-select" id="speed-select" title="Playback speed">
      <option value="0.5">0.5×</option>
      <option value="0.75">0.75×</option>
      <option value="1" selected>1×</option>
      <option value="1.25">1.25×</option>
      <option value="1.5">1.5×</option>
      <option value="2">2×</option>
    </select>
  </div>

  <!-- ─── Upload Modal ──────────────────────────────────────────────────────── -->
  <div id="upload-modal">
    <div class="modal-box">
      <button class="modal-close" id="upload-close">&#10005;</button>
      <h2>Upload a PDF Book</h2>
      <form id="upload-form">
        <div class="form-group">
          <label for="file-input">PDF File *</label>
          <input class="form-input" type="file" id="file-input" accept=".pdf,application/pdf" required />
        </div>
        <div class="form-group">
          <label for="title-input">Title (optional)</label>
          <input class="form-input" type="text" id="title-input" placeholder="Leave blank to use filename" />
        </div>
        <button class="btn-primary" type="submit" style="width:100%">Upload to Library</button>
        <div id="upload-status" class="upload-status"></div>
      </form>
    </div>
  </div>

  <!-- ─── Toast Notification ───────────────────────────────────────────────── -->
  <div id="toast"></div>

  <!-- ─── Scripts ──────────────────────────────────────────────────────────── -->
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
